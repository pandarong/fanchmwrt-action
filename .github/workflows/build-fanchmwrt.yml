name: Build fanchmwrt Firmware

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  # schedule:
  #   - cron: '0 2 * * 0'

env:
  REPO_URL: https://github.com/fanchmwrt/fanchmwrt
  REPO_BRANCH: v25.12.4  # ref_type: tag
  CONFIG_FILE: .config
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: еҲқе§ӢеҢ–зј–иҜ‘зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # жё…зҗҶз©әй—ҙ
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/graalvm /usr/local/.ghcup /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules

        # дҪҝз”Ёopenwrtе®ҳж–№зҡ„жҺЁиҚҗж–№ејҸinstall-buildsystem
        sudo apt update
        sudo apt install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget

        sudo timedatectl set-timezone "$TZ"

    - name: е…ӢйҡҶжәҗд»Јз Ғ
      run: |
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: жӣҙж–°feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: еҠ иҪҪиҮӘе®ҡд№үй…ҚзҪ®
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE $OPENWRT_PATH/.config

    - name: дёӢиҪҪзј–иҜ‘дҫқиө–
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: зј–иҜ‘еӣәд»¶
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"

        # йҰ–ж¬Ўе°қиҜ•еӨҡзәҝзЁӢзј–иҜ‘
        make -j$(nproc) || {
          echo "еӨҡзәҝзЁӢзј–иҜ‘еӨұиҙҘ,е°қиҜ•еҚ•зәҝзЁӢзј–иҜ‘..."
          # жё…зҗҶеҗҺеҚ•зәҝзЁӢиҜҰз»Ҷиҫ“еҮәзј–иҜ‘
          make -j1 V=s
        }

        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' $CONFIG_FILE | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: жЈҖжҹҘзЈҒзӣҳз©әй—ҙ
      if: (!cancelled())
      run: df -hT

    - name: ж•ҙзҗҶеӣәд»¶ж–Үд»¶
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: дёҠдј еӣәд»¶зӣ®еҪ•
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: fanchmwrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: з”ҹжҲҗreleaseж Үзӯҫ
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: дёҠдј еӣәд»¶еҲ°release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_PATH }}/*

    - name: еҲ йҷӨж—§зҡ„Releases
      uses: dev-drprasad/delete-older-releases@v0.3.0
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: еҲ йҷӨж—§зҡ„workflowиҝҗиЎҢи®°еҪ•
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3
